<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothing Extractor</title>
</head>
<body>
  <h2>Extract Clothes From an Image</h2>
  <p>This tool can keep all clothing pixels together, or split garments like tops and pants into separate wardrobe items.</p>

  <input type="file" id="fileInput" accept="image/*" />
  <button onclick="uploadImage()">Extract Clothes</button>
  <button onclick="extractItems()">Split Into Items</button>

  <h3>Result:</h3>
  <div style="
    display: inline-block;
    padding: 18px;
    border-radius: 18px;
    background: linear-gradient(145deg, #fbf7ef, #eee5d8);
    box-shadow: inset 0 0 0 1px rgba(120, 98, 72, 0.12);
  ">
    <img id="resultImage" style="max-width: 300px; display: block;" />
  </div>

  <h3>Separated Items:</h3>
  <div id="itemsContainer" style="
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 12px;
  "></div>

  <script>
    function getSelectedFile() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select an image first.");
        return null;
      }

      return file;
    }

    function buildFormData(file) {
      const formData = new FormData();
      formData.append("file", file);
      return formData;
    }

    function resetSplitResults() {
      document.getElementById("itemsContainer").innerHTML = "";
    }

    async function uploadImage() {
      const file = getSelectedFile();
      if (!file) {
        return;
      }
      resetSplitResults();

      try {
        const response = await fetch("http://127.0.0.1:5000/extract-clothes", {
          method: "POST",
          body: buildFormData(file)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => null);
          alert(error?.error || "Failed to process image.");
          return;
        }

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);
        document.getElementById("resultImage").src = imageUrl;
      } catch (error) {
        console.error(error);
        alert("Something went wrong.");
      }
    }

    async function extractItems() {
      const file = getSelectedFile();
      if (!file) {
        return;
      }

      document.getElementById("resultImage").src = "";

      try {
        const response = await fetch("http://127.0.0.1:5000/extract-items", {
          method: "POST",
          body: buildFormData(file)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => null);
          alert(error?.error || "Failed to split items.");
          return;
        }

        const data = await response.json();
        const itemsContainer = document.getElementById("itemsContainer");
        itemsContainer.innerHTML = "";

        if (!data.items || data.items.length === 0) {
          itemsContainer.innerHTML = "<p>No separate garments were detected.</p>";
          return;
        }

        data.items.forEach((item) => {
          const card = document.createElement("div");
          card.style.cssText = `
            width: 220px;
            padding: 16px;
            border-radius: 18px;
            background: linear-gradient(145deg, #fbf7ef, #eee5d8);
            box-shadow: inset 0 0 0 1px rgba(120, 98, 72, 0.12);
          `;

          const title = document.createElement("h4");
          title.textContent = item.category;
          title.style.margin = "0 0 12px 0";

          const img = document.createElement("img");
          img.src = item.image;
          img.style.maxWidth = "100%";
          img.style.display = "block";

          card.appendChild(title);
          card.appendChild(img);
          itemsContainer.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        alert("Something went wrong.");
      }
    }
  </script>
</body>
</html>
