<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothing Extractor</title>
</head>
<body>
  <h2>Classify Clothing Images</h2>
  <p>This tool classifies uploaded clothing images into upper body, lower body, or footwear subcategories.</p>

  <input type="file" id="fileInput" accept="image/*" multiple />
  <button onclick="classifyBatchImages()">Classify Batch Images</button>

  <h3>Classification Result:</h3>
  <div id="itemsContainer" style="
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 12px;
  "></div>

  <script>
    /**
     * Returns the currently selected upload files.
     * @returns {File[]}
     */
    function getSelectedFiles() {
      const fileInput = document.getElementById("fileInput");
      const files = Array.from(fileInput.files || []);

      if (files.length === 0) {
        alert("Please select at least one image.");
        return [];
      }

      return files;
    }

    /**
     * Creates a multipart form payload for image upload.
     * @param {File[]} files
     * @returns {FormData}
     */
    function buildFormData(files, extraFields = {}) {
      const formData = new FormData();
      files.forEach((file) => formData.append("files", file));
      Object.entries(extraFields).forEach(([key, value]) => {
        formData.append(key, value);
      });
      return formData;
    }

    /**
     * Clears all classification cards from the result area.
     * @returns {void}
     */
    function resetSplitResults() {
      document.getElementById("itemsContainer").innerHTML = "";
    }

    /**
     * Sends multiple images for batch clothing classification.
     * @returns {Promise<void>}
     */
    async function classifyBatchImages() {
      const files = getSelectedFiles();
      if (files.length === 0) {
        return;
      }

      try {
        const response = await fetch("http://127.0.0.1:5000/extract-items", {
          method: "POST",
          body: buildFormData(files, { preview_mode: "high" })
        });

        if (!response.ok) {
          const error = await response.json().catch(() => null);
          alert(error?.error || "Failed to classify batch items.");
          return;
        }

        const data = await response.json();
        if (!data.results || data.results.length === 0) {
          document.getElementById("itemsContainer").innerHTML = "<p>No valid analysis result was returned.</p>";
          return;
        }

        renderResultCards(data.results);
        if (typeof data.processing_ms === "number") {
          console.log(`Batch processed in ${data.processing_ms} ms`);
        }
      } catch (error) {
        console.error(error);
        alert("Something went wrong.");
      }
    }

    /**
     * Renders classification cards for one or many images.
     * @param {Array<Object>} results
     * @returns {void}
     */
    function renderResultCards(results) {
      const itemsContainer = document.getElementById("itemsContainer");
      itemsContainer.innerHTML = "";

      results.forEach((result) => {
        const card = document.createElement("div");
        card.style.cssText = `
          width: 300px;
          padding: 16px;
          border-radius: 18px;
          background: linear-gradient(145deg, #fbf7ef, #eee5d8);
          box-shadow: inset 0 0 0 1px rgba(120, 98, 72, 0.12);
        `;

        const filename = document.createElement("h4");
        filename.textContent = result.filename || "Unnamed file";
        filename.style.margin = "0 0 8px 0";
        card.appendChild(filename);

        if (!result.ok) {
          const errorLine = document.createElement("p");
          errorLine.textContent = `Error: ${result.error || "Unknown failure"}`;
          errorLine.style.margin = "0";
          errorLine.style.color = "#9b1c1c";
          card.appendChild(errorLine);
          itemsContainer.appendChild(card);
          return;
        }

        const title = document.createElement("p");
        title.textContent = `Category: ${result.category}`;
        title.style.margin = "0 0 6px 0";

        const subTitle = document.createElement("p");
        subTitle.textContent = `Subcategory: ${result.subcategory}`;
        subTitle.style.margin = "0 0 6px 0";

        const scoreLine = document.createElement("p");
        scoreLine.textContent = `Confidence: ${result.subcategory_confidence}`;
        scoreLine.style.margin = "0 0 6px 0";

        const sourceLine = document.createElement("p");
        sourceLine.textContent = `Category source: ${result.category_source}`;
        sourceLine.style.margin = "0 0 12px 0";

        const img = document.createElement("img");
        img.src = result.preview_image;
        img.style.maxWidth = "100%";
        img.style.display = "block";

        card.appendChild(title);
        card.appendChild(subTitle);
        card.appendChild(scoreLine);
        card.appendChild(sourceLine);
        card.appendChild(img);
        itemsContainer.appendChild(card);

        if (result.preview_token && result.preview_ready === false) {
          pollPreviewResult(result.preview_token, img);
        }
      });
    }

    /**
     * Polls backend until high-quality preview is ready and swaps the image.
     * @param {string} previewToken
     * @param {HTMLImageElement} imageElement
     * @returns {Promise<void>}
     */
    async function pollPreviewResult(previewToken, imageElement) {
      for (let attempt = 0; attempt < 40; attempt += 1) {
        try {
          const response = await fetch(`http://127.0.0.1:5000/preview-result/${previewToken}`);
          if (!response.ok) {
            return;
          }
          const data = await response.json();
          if (data.ready && data.preview_image) {
            imageElement.src = data.preview_image;
            return;
          }
        } catch (error) {
          console.error(error);
          return;
        }

        await new Promise((resolve) => setTimeout(resolve, 500));
      }
    }
  </script>
</body>
</html>
